            - application_menu.aaxis_tab.aaxis_devtools_group.aaxis_devtools_bucket_browser
        routes:
            - aaxis_devtools_bucket_browser
            - aaxis_devtools_bucket_browser_list
            - aaxis_devtools_bucket_browser_preview
            - aaxis_devtools_bucket_browser_raw
            - aaxis_devtools_bucket_browser_download
            - aaxis_devtools_bucket_browser_folder
            - aaxis_devtools_bucket_browser_upload
            - aaxis_devtools_bucket_browser_delete

    aaxis_devtools_database_viewer:
        label: aaxis.devtools.feature.database_viewer.label
        toggle: aaxis_devtools.database_viewer_enabled
        dependencies:
            - aaxis_devtools
        navigation_items:
            - application_menu.aaxis_tab.aaxis_devtools_group.aaxis_devtools_database_viewer
        routes:
            - aaxis_devtools_database_viewer
            - aaxis_devtools_database_viewer_objects
            - aaxis_devtools_database_viewer_query
            - aaxis_devtools_database_viewer_export
            - aaxis_devtools_database_viewer_columns
            - aaxis_devtools_database_viewer_saved_queries
            - aaxis_devtools_database_viewer_saved_queries_all
            - aaxis_devtools_database_viewer_saved_query_create
            - aaxis_devtools_database_viewer_saved_query_update

    aaxis_devtools_elastic_viewer:
        label: aaxis.devtools.feature.elastic_viewer.label
        toggle: aaxis_devtools.elastic_viewer_enabled
        dependencies:
            - aaxis_devtools
        navigation_items:
            - application_menu.aaxis_tab.aaxis_devtools_group.aaxis_devtools_elastic_viewer
        routes:
            - aaxis_devtools_elastic_viewer
            - aaxis_devtools_elastic_viewer_indices
