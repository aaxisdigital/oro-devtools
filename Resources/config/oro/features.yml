    aaxis_devtools_mongodb_viewer:
        label: aaxis.devtools.feature.mongodb_viewer.label
        toggle: aaxis_devtools.mongodb_viewer_enabled
        dependencies:
            - aaxis_devtools
        navigation_items:
            - application_menu.aaxis_tab.aaxis_devtools_group.aaxis_devtools_mongodb_viewer
        routes:
