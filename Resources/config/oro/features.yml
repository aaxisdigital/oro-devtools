features:
    # Master access gate for the whole bundle. It has NO config toggle and uses the
    # "affirmative" strategy with allow_if_all_abstain=false, so with no voter granting it
    # the feature is DISABLED by default — which 404s every tool route and hides the menu
    # (every tool below declares "dependencies: [aaxis_devtools]"). To enable it, the
    # consuming application overrides the "aaxis_devtools.feature.access_checker" service
    # with its own host/IP/env logic (see DevToolsAccessCheckerInterface). This is the
    # single, code-controlled on/off switch for the toolbox.
    aaxis_devtools:
        label: aaxis.devtools.feature.label
        strategy: affirmative
        allow_if_all_abstain: false

    aaxis_devtools_runtime_config:
        label: aaxis.devtools.feature.runtime_config.label
        toggle: aaxis_devtools.runtime_config_enabled
        dependencies:
            - aaxis_devtools
        navigation_items:
            - application_menu.aaxis_tab.aaxis_devtools_group.aaxis_devtools_runtime_config
        routes:
            - aaxis_devtools_runtime_config

    aaxis_devtools_connection_info:
        label: aaxis.devtools.feature.connection_info.label
        toggle: aaxis_devtools.connection_info_enabled
        dependencies:
            - aaxis_devtools
        navigation_items:
            - application_menu.aaxis_tab.aaxis_devtools_group.aaxis_devtools_connection_info
        routes:
            - aaxis_devtools_connection_info
            - aaxis_devtools_connection_info_resolve

    aaxis_devtools_filesystem_browser:
        label: aaxis.devtools.feature.filesystem_browser.label
        toggle: aaxis_devtools.filesystem_browser_enabled
        dependencies:
            - aaxis_devtools
        navigation_items:
            - application_menu.aaxis_tab.aaxis_devtools_group.aaxis_devtools_filesystem_browser
        routes:
            - aaxis_devtools_filesystem_browser
            - aaxis_devtools_filesystem_browser_list
            - aaxis_devtools_filesystem_browser_preview
            - aaxis_devtools_filesystem_browser_raw
            - aaxis_devtools_filesystem_browser_download

    aaxis_devtools_bucket_browser:
