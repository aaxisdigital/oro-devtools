        aaxis_devtools.runtime_config_enabled:
            data_type: boolean
            type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
            options:
                label: aaxis.devtools.config.enabled.label
                required: false

        # --- Connection Info ---
        aaxis_devtools.connection_info_enabled:
            data_type: boolean
            type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
            options:
                label: aaxis.devtools.config.enabled.label
                required: false

    tree:
        system_configuration:
            platform:
                children:
                    general_setup:
                        children:
                            aaxis_devtools:
                                priority: 95
                                children:
                                    aaxis_devtools_runtime_config:
                                        priority: 110
                                        children:
                                            - aaxis_devtools.runtime_config_enabled
                                    aaxis_devtools_connection_info:
                                        priority: 108
                                        children:
                                            - aaxis_devtools.connection_info_enabled
                                    aaxis_devtools_filesystem_browser:
                                        priority: 100
                                        children:
                                            - aaxis_devtools.filesystem_browser_enabled
                                            - aaxis_devtools.filesystem_browser_base_path
                                            - aaxis_devtools.filesystem_browser_restricted
                                            - aaxis_devtools.filesystem_browser_col_type
                                            - aaxis_devtools.filesystem_browser_col_filename
                                            - aaxis_devtools.filesystem_browser_col_filesize
                                            - aaxis_devtools.filesystem_browser_col_modified
                                            - aaxis_devtools.filesystem_browser_col_created
                                            - aaxis_devtools.filesystem_browser_col_owner_user
                                            - aaxis_devtools.filesystem_browser_col_owner_group
                                            - aaxis_devtools.filesystem_browser_col_preview
                                    aaxis_devtools_bucket_browser:
                                        priority: 90
                                        children:
                                            - aaxis_devtools.bucket_browser_enabled
                                            - aaxis_devtools.bucket_browser_test
                                            - aaxis_devtools.bucket_browser_url
                                            - aaxis_devtools.bucket_browser_user
                                            - aaxis_devtools.bucket_browser_pass
                                            - aaxis_devtools.bucket_browser_name
                                            - aaxis_devtools.bucket_browser_read_only
                                    aaxis_devtools_database_viewer:
                                        priority: 80
                                        children:
                                            - aaxis_devtools.database_viewer_enabled
                                            - aaxis_devtools.database_viewer_test
                                            - aaxis_devtools.database_viewer_show_views
                                            - aaxis_devtools.database_viewer_show_functions
                                            - aaxis_devtools.database_viewer_show_row_numbers
                                            - aaxis_devtools.database_viewer_allow_export
                                            - aaxis_devtools.database_viewer_history_retention_days
                                    aaxis_devtools_elastic_viewer:
                                        priority: 70
                                        children:
                                            - aaxis_devtools.elastic_viewer_enabled
                                            - aaxis_devtools.elastic_viewer_test
                                            - aaxis_devtools.elastic_viewer_allow_export
                                    aaxis_devtools_redis_viewer:
                                        priority: 65
                                        children:
                                            - aaxis_devtools.redis_viewer_enabled
                                            - aaxis_devtools.redis_viewer_test
                                            - aaxis_devtools.redis_viewer_dsn
                                    aaxis_devtools_mongodb_viewer:
                                        priority: 63
                                        children:
                                            - aaxis_devtools.mongodb_viewer_enabled
                                            - aaxis_devtools.mongodb_viewer_test
                                            - aaxis_devtools.mongodb_viewer_dsn
                                    aaxis_devtools_network_tools:
                                        priority: 50
                                        children:
                                            - aaxis_devtools.network_tools_enabled
                                            - aaxis_devtools.network_tools_dns
                                            - aaxis_devtools.network_tools_ping
                                            - aaxis_devtools.network_tools_traceroute
                                            - aaxis_devtools.network_tools_socket
                                            - aaxis_devtools.network_tools_curl
                                            - aaxis_devtools.network_tools_ssl_cert
                                            - aaxis_devtools.network_tools_ciphers
                                            - aaxis_devtools.network_tools_history_retention_days
