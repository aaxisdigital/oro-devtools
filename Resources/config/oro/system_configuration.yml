                required: false
        aaxis_devtools.filesystem_browser_restricted:
            data_type: boolean
            type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
            options:
                label: aaxis.devtools.config.filesystem_browser.restricted.label
                tooltip: aaxis.devtools.config.filesystem_browser.restricted.tooltip
                required: false
        aaxis_devtools.filesystem_browser_col_type:
            data_type: boolean
            type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
            options:
                label: aaxis.devtools.config.filesystem_browser.col_type.label
                required: false
        aaxis_devtools.filesystem_browser_col_filename:
            data_type: boolean
            type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
            options:
                label: aaxis.devtools.config.filesystem_browser.col_filename.label
                required: false
        aaxis_devtools.filesystem_browser_col_filesize:
            data_type: boolean
            type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
            options:
                label: aaxis.devtools.config.filesystem_browser.col_filesize.label
                required: false
        aaxis_devtools.filesystem_browser_col_modified:
            data_type: boolean
            type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
            options:
                label: aaxis.devtools.config.filesystem_browser.col_modified.label
                required: false
        aaxis_devtools.filesystem_browser_col_created:
            data_type: boolean
            type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
            options:
                label: aaxis.devtools.config.filesystem_browser.col_created.label
                required: false
        aaxis_devtools.filesystem_browser_col_owner_user:
            data_type: boolean
            type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
            options:
                label: aaxis.devtools.config.filesystem_browser.col_owner_user.label
                required: false
        aaxis_devtools.filesystem_browser_col_owner_group:
            data_type: boolean
            type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
            options:
                label: aaxis.devtools.config.filesystem_browser.col_owner_group.label
                required: false
        aaxis_devtools.filesystem_browser_col_preview:
            data_type: boolean
            type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
            options:
                label: aaxis.devtools.config.filesystem_browser.col_preview.label
                required: false

        # --- Bucket Browser ---
        aaxis_devtools.bucket_browser_enabled:
            data_type: boolean
            type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
            options:
