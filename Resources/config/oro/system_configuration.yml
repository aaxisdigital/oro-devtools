system_configuration:
    groups:
        aaxis_devtools:
            title: aaxis.devtools.config.group.title
            icon: fa-user-secret
        aaxis_devtools_database_viewer:
            title: aaxis.devtools.config.database_viewer.title
        aaxis_devtools_network_tools:
            title: aaxis.devtools.config.network_tools.title
        aaxis_devtools_elastic_viewer:
            title: aaxis.devtools.config.elastic_viewer.title
        aaxis_devtools_redis_viewer:
            title: aaxis.devtools.config.redis_viewer.title
        aaxis_devtools_mongodb_viewer:
            title: aaxis.devtools.config.mongodb_viewer.title
        aaxis_devtools_filesystem_browser:
            title: aaxis.devtools.config.filesystem_browser.title
        aaxis_devtools_bucket_browser:
            title: aaxis.devtools.config.bucket_browser.title
        aaxis_devtools_runtime_config:
            title: aaxis.devtools.config.runtime_config.title
        aaxis_devtools_connection_info:
            title: aaxis.devtools.config.connection_info.title

    fields:
        # --- Database Viewer ---
        aaxis_devtools.database_viewer_enabled:
            data_type: boolean
            type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
            options:
                label: aaxis.devtools.config.enabled.label
                required: false
        aaxis_devtools.database_viewer_test:
            data_type: string
            type: Symfony\Component\Form\Extension\Core\Type\TextType
            options:
                label: aaxis.devtools.config.test.label
                required: false
                resettable: false
                attr:
                    data-page-component-module: 'aaxiscommon/js/app/components/connection-test-component'
                    data-page-component-options: '{"tool":"database_viewer"}'
        aaxis_devtools.database_viewer_show_views:
            data_type: boolean
            type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
            options:
                label: aaxis.devtools.config.database_viewer.show_views.label
                required: false
        aaxis_devtools.database_viewer_show_functions:
            data_type: boolean
            type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
            options:
                label: aaxis.devtools.config.database_viewer.show_functions.label
                required: false
        aaxis_devtools.database_viewer_show_row_numbers:
            data_type: boolean
            type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
            options:
                label: aaxis.devtools.config.database_viewer.show_row_numbers.label
                required: false
        aaxis_devtools.database_viewer_allow_export:
            data_type: boolean
            type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
            options:
                label: aaxis.devtools.config.allow_export.label
                required: false
        aaxis_devtools.database_viewer_history_retention_days:
            data_type: integer
            type: Symfony\Component\Form\Extension\Core\Type\IntegerType
            options:
                label: aaxis.devtools.config.history_retention.label
                tooltip: aaxis.devtools.config.history_retention.tooltip
                required: false

        # --- Network Tools ---
        aaxis_devtools.network_tools_enabled:
            data_type: boolean
            type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
            options:
                label: aaxis.devtools.config.enabled.label
                required: false
        aaxis_devtools.network_tools_dns:
            data_type: boolean
            type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
            options:
                label: aaxis.devtools.config.network_tools.dns.label
                required: false
        aaxis_devtools.network_tools_ping:
            data_type: boolean
            type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
            options:
                label: aaxis.devtools.config.network_tools.ping.label
                required: false
        aaxis_devtools.network_tools_traceroute:
            data_type: boolean
            type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
            options:
                label: aaxis.devtools.config.network_tools.traceroute.label
                required: false
        aaxis_devtools.network_tools_socket:
            data_type: boolean
            type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
            options:
                label: aaxis.devtools.config.network_tools.socket.label
                required: false
        aaxis_devtools.network_tools_curl:
            data_type: boolean
            type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
            options:
                label: aaxis.devtools.config.network_tools.curl.label
                required: false
        aaxis_devtools.network_tools_ssl_cert:
            data_type: boolean
            type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
            options:
                label: aaxis.devtools.config.network_tools.ssl_cert.label
                required: false
        aaxis_devtools.network_tools_ciphers:
            data_type: boolean
            type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
            options:
                label: aaxis.devtools.config.network_tools.ciphers.label
                required: false
        aaxis_devtools.network_tools_history_retention_days:
            data_type: integer
            type: Symfony\Component\Form\Extension\Core\Type\IntegerType
            options:
                label: aaxis.devtools.config.history_retention.label
                tooltip: aaxis.devtools.config.history_retention.tooltip
                required: false

        # --- Elastic Viewer ---
        aaxis_devtools.elastic_viewer_enabled:
            data_type: boolean
            type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
            options:
                label: aaxis.devtools.config.enabled.label
                required: false
        aaxis_devtools.elastic_viewer_test:
            data_type: string
            type: Symfony\Component\Form\Extension\Core\Type\TextType
            options:
                label: aaxis.devtools.config.test.label
                required: false
                resettable: false
                attr:
                    data-page-component-module: 'aaxiscommon/js/app/components/connection-test-component'
                    data-page-component-options: '{"tool":"elastic_viewer"}'
        aaxis_devtools.elastic_viewer_allow_export:
            data_type: boolean
            type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
            options:
                label: aaxis.devtools.config.allow_export.label
                required: false

