                required: false
        aaxis_devtools.bucket_browser_test:
            data_type: string
            type: Symfony\Component\Form\Extension\Core\Type\TextType
            options:
                label: aaxis.devtools.config.test.label
                required: false
                resettable: false
                attr:
                    data-page-component-module: 'aaxiscommon/js/app/components/connection-test-component'
                    data-page-component-options: '{"tool":"bucket_browser"}'
        aaxis_devtools.bucket_browser_url:
            data_type: string
            type: Symfony\Component\Form\Extension\Core\Type\TextType
            options:
                label: aaxis.devtools.config.bucket_browser.url.label
                tooltip: aaxis.devtools.config.bucket_browser.url.tooltip
                required: false
        aaxis_devtools.bucket_browser_user:
            data_type: string
            type: Symfony\Component\Form\Extension\Core\Type\TextType
            options:
                label: aaxis.devtools.config.bucket_browser.user.label
                required: false
        aaxis_devtools.bucket_browser_pass:
            data_type: string
            # Encrypted at rest + renders a "*" placeholder when set, so re-saving the section
            # without retyping keeps the stored secret instead of wiping it.
            type: Oro\Bundle\FormBundle\Form\Type\OroEncodedPlaceholderPasswordType
            options:
                label: aaxis.devtools.config.bucket_browser.pass.label
                required: false
        aaxis_devtools.bucket_browser_name:
            data_type: string
            type: Symfony\Component\Form\Extension\Core\Type\TextType
            options:
                label: aaxis.devtools.config.bucket_browser.name.label
                tooltip: aaxis.devtools.config.bucket_browser.name.tooltip
                required: false
        aaxis_devtools.bucket_browser_read_only:
            data_type: boolean
            type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
            options:
                label: aaxis.devtools.config.bucket_browser.read_only.label
                required: false

