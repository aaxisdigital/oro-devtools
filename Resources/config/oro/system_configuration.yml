        aaxis_devtools.redis_viewer_enabled:
            data_type: boolean
            type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
            options:
                label: aaxis.devtools.config.enabled.label
                required: false
        aaxis_devtools.redis_viewer_test:
            data_type: string
            type: Symfony\Component\Form\Extension\Core\Type\TextType
            options:
                label: aaxis.devtools.config.test.label
                required: false
                resettable: false
                attr:
                    data-page-component-module: 'aaxiscommon/js/app/components/connection-test-component'
                    data-page-component-options: '{"tool":"redis_viewer"}'
        aaxis_devtools.redis_viewer_dsn:
            data_type: string
            type: Symfony\Component\Form\Extension\Core\Type\TextType
            options:
                label: aaxis.devtools.config.redis_viewer.dsn.label
                tooltip: aaxis.devtools.config.redis_viewer.dsn.tooltip
                required: false

        # --- MongoDB Viewer ---
        aaxis_devtools.mongodb_viewer_enabled:
            data_type: boolean
            type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
            options:
                label: aaxis.devtools.config.enabled.label
                required: false
        aaxis_devtools.mongodb_viewer_test:
            data_type: string
            type: Symfony\Component\Form\Extension\Core\Type\TextType
            options:
                label: aaxis.devtools.config.test.label
                required: false
                resettable: false
                attr:
                    data-page-component-module: 'aaxiscommon/js/app/components/connection-test-component'
                    data-page-component-options: '{"tool":"mongodb_viewer"}'
        aaxis_devtools.mongodb_viewer_dsn:
            data_type: string
            type: Symfony\Component\Form\Extension\Core\Type\TextType
            options:
                label: aaxis.devtools.config.mongodb_viewer.dsn.label
                tooltip: aaxis.devtools.config.mongodb_viewer.dsn.tooltip
                required: false

        # --- Filesystem Browser ---
        aaxis_devtools.filesystem_browser_enabled:
            data_type: boolean
            type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
            options:
                label: aaxis.devtools.config.enabled.label
                required: false
        aaxis_devtools.filesystem_browser_base_path:
            data_type: string
            type: Symfony\Component\Form\Extension\Core\Type\TextType
            options:
